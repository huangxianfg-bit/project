<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Graphy02</title>
  <script src="/js/echarts.min.js"></script>
  <script src="/js/jquery-3.2.1.min.js"></script>
</head>

<body>
<div id="main01" style="width: 1000px;height: 500px">

</div>
<script>
  $(function () {
    var chartDom = document.getElementById('main01');
    var myChart = echarts.init(chartDom);

    $.getJSON("/displayComments",function(datas) {
      var data1 = []
      for(var i= 0; i<datas.length;i++){
        var json = {}
        json.value = datas[i]["total"]
        json.name = datas[i]["genre"]
        data1.push(json)
      }
      console.log(data1)

      option = {
        title: {
          text: 'Referer of a Website',
          subtext: 'Fake Data',
          left: 'center'
        },
        tooltip: {
          trigger: 'item'
        },
        legend: {
          orient: 'vertical',
          left: 'left'
        },
        series: [
          {
            name: 'Access From',
            type: 'pie',
            radius: '50%',
            data: data1,
            emphasis: {
              itemStyle: {
                shadowBlur: 10,
                shadowOffsetX: 0,
                shadowColor: 'rgba(0, 0, 0, 0.5)'
              }
            }
          }
        ]
      };

      option && myChart.setOption(option);
    })
  })
</script>

</body>
</html>
