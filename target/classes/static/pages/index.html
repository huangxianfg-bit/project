<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="/js/echarts.min.js"></script>
    <script src="/js/jquery-3.2.1.min.js"></script>
    <style>
        * {
            margin: 10px auto;
        }
        .title {
            text-align: center;
            color: darkslategrey;
            margin-bottom: 30px;

        }
        #genre_totals {
            margin-top: 50px;
        }

        div {
            margin-top: 40px;
        }

    </style>
</head>
<body>
<dialog>数据来源</dialog>

<div class="context">
    <h2 class="title">电影大数据分析</h2>

<!--1.每年(按年升序排序)对应的每个国家的电影-->
    <div id="year_country_sort_total_films" style="width: 1100px;height: 500px"></div>
    <!--每年(按年升序排序)对应的每个国家的电影-->
    <script src="../js/year_country_sort_total_films.js"></script>

<!--2.不同风格的数量统计-->
    <div id="genre_total_films" style="width: 600px;height: 600px"></div>
    <!--不同风格的数量统计-->
    <script src="../js/genre_total_films.js"></script>

<!--3.不同演员参与的总电影数-->
    <div id="actors_total_films" style="width: 1100px;height: 700px;"></div>
    <!--不同演员参与的总电影数-->
    <script src="../js/actor_total_films.js"></script>

<!--    4.每年的总的电影数量-->
    <div id="every_year_total_films_1" style="width:1400px; height: 500px;"></div>
    <div id="every_year_total_films_2" style="width:1400px; height: 500px;"></div>

    <!--    4.每年的总的电影数量-->
    <script src="../js/every_year_total_films_1.js"></script>
    <script src="../js/every_year_total_films_2.js"></script>

<!--    5.电影时长与平均评分的关系-->
    <div id="duration_avg_vote" style="width:1000px; height: 500px;"></div>
    <!--    电影时长与平均评分的关系-->
    <script src="../js/duration_avg_vote.js"></script>

<!--    6.每年不同风格的电影数量10-22年-->
    <div id="everyYear_genre_total_films" style="width:1200px; height: 500px;"></div>
    <!--    每年不同风格的电影数量10-22年-->
    <script src="../js/everyYear_genre_total_films.js"></script>

<!--    7.每个国家电影平均分统计t10-->
    <div id="country_avg" style="width:1400px; height: 500px;"></div>
    <!-- 每个国家电影平均分统计t10-->
    <script src="../js/country_avg.js"></script>

<!--  8.导演的电影平均分统计t_b10-->
    <div id="directorAvg" style="width:1400px; height: 500px;"></div>
    <!-- 导演的电影平均分统计t_b10-->
    <script src="../js/director_avg10.js"></script>

<!--    9.每年电影平均分趋势-->
    <div id="everyYearAvg" style="width:1400px; height: 500px;"></div>
    <!-- 每年电影平均分趋势-->
    <script src="../js/every_year_avg.js"></script>


<!--    10.不同导演拍的总电影数量以及他们的平均分top20-->
    <div id="everyDirectorTotalFilms" style="width:1400px; height: 600px;"></div>
    <!--    不同导演拍的总电影数量以及他们的平均分top20-->
    <script src="../js/every_director_total_films_avg20.js"></script>

</div>

</body>
</html>
