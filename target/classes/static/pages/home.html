<!-- 弹窗 -->
    <div class="overlay">
        <dialog id="favDialog">
            <form method="dialog">
                <div class="jumbotron">
                    <h1 class="display-4">特别说明！</h1>
                    <p class="lead">电影数据可在IMDb和许多其他网站上找到，包括平均票数，投票数，评论和描述。
                        内容来源电影数据集，以及标题、年份、流派、持续时间、国家、导演、演员、平均票数和票数。
                        数据包含 40，047 部电影和 19 个属性。
                        (电影推荐)数据已从截至 2022 年 11 月 24 日的公开网站数据来源</p>
                    <hr class="my-4">
                    <p class="tip">本站统计结果均基于获取: <br>
                        <a class="link" href="https://www.kaggle.com/datasets/stefanoleone992/filmtv-movies-dataset/versions/3?resource=download">

                </div>
            </form>
        </dialog>

<!-- 导航栏部分   请在data-target(自定义属性)处写你将要展示的div的id  该做法将决定你是否与其内容对应绑定-->
<ul class="nav nav-pills mb-3" id="pills-tab" role="tablist">
<!--  电影-->
  <li class="nav-item" role="presentation">
    <button class="nav-link active" id="pills-home-tab" data-toggle="pill" data-target="#pills-film" type="button" role="tab" aria-controls="pills-home" aria-selected="true">电影</button>
  </li>

<!--  演员-->
  <li class="nav-item" role="presentation">
    <button class="nav-link" id="pills-profile-tab" data-toggle="pill" data-target="#pills-actor" type="button" role="tab" aria-controls="pills-profile" aria-selected="false">演员</button>
  </li>

<!--  导演-->
  <li class="nav-item" role="presentation">
    <button class="nav-link" id="pills-contact-tab" data-toggle="pill" data-target="#pills-director" type="button" role="tab" aria-controls="pills-contact" aria-selected="false">导演</button>
  </li>

<!--  国家-->
  <li class="nav-item" role="presentation">
    <button class="nav-link" id="pills-contact-tab1" data-toggle="pill" data-target="#pills-country" type="button" role="tab" aria-controls="pills-contact" aria-selected="false">国家</button>
  </li>

<!-- 类型 -->
  <li class="nav-item" role="presentation">
    <button class="nav-link" id="pills-contact-tab2" data-toggle="pill" data-target="#pills-genre" type="button" role="tab" aria-controls="pills-contact" aria-selected="false">类型</button>
  </li>

  <!-- 年份 -->
  <li class="nav-item" role="presentation">
    <button class="nav-link" id="pills-contact-year" data-toggle="pill" data-target="#pills-year" type="button" role="tab" aria-controls="pills-contact" aria-selected="false">年份</button>
  </li>
</ul>

<div class="tab-content" id="pills-tabContent">

    <div class="tab-pane fade show active" id="pills-film" role="tabpanel" aria-labelledby="pills-profile-tab">

          <!--1.每年(按年升序排序)对应的每个国家的电影-->
          <div id="year_country_sort_total_films" style="width: 1100px;height: 500px"></div>
          <script src="../js/year_country_sort_total_films.js"></script>



          <!--    4.每年的总的电影数量-->
          <div id="every_year_total_films_1" style="width:1400px; height: 500px;"></div>
          <div id="every_year_total_films_2" style="width:1400px; height: 500px;"></div>
          <!--    每年的总的电影数量-->
          <script src="../js/every_year_total_films_1.js"></script>
          <script src="../js/every_year_total_films_2.js"></script>

          <!--    5.电影时长与平均评分的关系-->
          <div id="duration_avg_vote" style="width:1000px; height: 500px;"></div>
          <!--    电影时长与平均评分的关系-->
          <script src="../js/duration_avg_vote.js"></script>

    </div>



    <div class="tab-pane fade" id="pills-actor" role="tabpanel" aria-labelledby="pills-profile-tab">

          <!--3.不同演员参与的总电影数-->
          <div id="actors_total_films" style="width: 1100px;height: 700px;"></div>
          <!--不同演员参与的总电影数-->
          <script src="../js/actor_total_films.js"></script>

    </div>



    <div class="tab-pane fade" id="pills-director" role="tabpanel" aria-labelledby="pills-contact-tab">

          <!--  8.导演的电影平均分统计t_b10-->
          <div id="directorAvg" style="width:1400px; height: 500px;"></div>
          <!-- 导演的电影平均分统计t_b10-->
          <script src="../js/director_avg10.js"></script>

          <!--    10.不同导演拍的总电影数量以及他们的平均分top20-->
          <div id="everyDirectorTotalFilms" style="width:1400px; height: 600px;"></div>
          <!--    不同导演拍的总电影数量以及他们的平均分top20-->
          <script src="../js/every_director_total_films_avg20.js"></script>


    </div>


    <div class="tab-pane fade" id="pills-country" role="tabpanel" aria-labelledby="pills-profile-tab">

          <!--    7.每个国家电影平均分统计t10-->
          <h3>每个国家电影平均分统计t10</h3>
          <div id="country_avg" style="width:1400px; height: 500px;"></div>
          <!-- 每个国家电影平均分统计t10-->
          <script src="../js/country_avg.js"></script>

    </div>


<!--  pills-genre-->
  <div class="tab-pane fade" id="pills-genre" role="tabpanel" aria-labelledby="pills-contact-tab">

          <!--2.不同风格的数量统计-->
          <div id="genre_total_films" style="width: 600px;height: 600px"></div>
          <!--不同风格的数量统计-->
          <script src="../js/genre_total_films.js"></script>

          <!--    6.每年不同风格的电影数量10-22年-->
          <div id="everyYear_genre_total_films" style="width:1200px; height: 500px;"></div>
          <!--    每年不同风格的电影数量10-22年-->
          <script src="../js/everyYear_genre_total_films.js"></script>

  </div>


  <div class="tab-pane fade" id="pills-year" role="tabpanel" aria-labelledby="pills-profile-tab">

          <!--    9.每年电影平均分趋势-->
          <div id="everyYearAvg" style="width:1400px; height: 500px;"></div>
          <!-- 每年电影平均分趋势-->
          <script src="../js/every_year_avg.js"></script>

  </div>


</div>



<script>
  const updateButton = document.getElementById('updateDetails');
  const favDialog = document.getElementById('favDialog');
  const Iknow = favDialog.querySelector('#Iknow');
  const divs = document.querySelectorAll(".tab-content div")

  // 弹窗-- 对favDialog标签的浏览器兼容性处理
  if (typeof favDialog.showModal !== 'function') {
    favDialog.hidden = true;
  }
  // 弹出
  favDialog.showModal();


  //导航栏 注册监听事件
  $('#pills-tab').on('click', function (event) {
    event.preventDefault()
    $(document.querySelector(".show").target.dataset.target).tab("dispose")
    $(event.target.dataset.target).tab("show")
    console.log(event.target.dataset.target);
  })

</script>
